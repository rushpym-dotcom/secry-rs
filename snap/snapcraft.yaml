name: secry
version: '1.1.7'
summary: AES-256-GCM / ChaCha20-Poly1305 / XChaCha20-Poly1305 token encryption CLI
description: |
  secry is a token encryption CLI and library.
  Supports AES-256-GCM, ChaCha20-Poly1305 and XChaCha20-Poly1305.
  Features: encrypt/decrypt, seal (one-way), seal-enc (reversible with IP binding),
  token inspection, password generation, fingerprint, and more.
  Installs two binaries: secry and sec (alias).

grade: stable
confinement: strict
base: core22

apps:
  secry:
    command: bin/secry
    plugs:
      - network
      - home
  sec:
    command: bin/secry
    plugs:
      - network
      - home

parts:
  secry:
    plugin: rust
    source: https://github.com/rushpym-dotcom/secry-rs.git
    source-tag: v1.1.7
    rust-channel: stable
    override-build: |
      craftctl default
      install -Dm755 target/release/secry $CRAFT_PART_INSTALL/bin/secry
